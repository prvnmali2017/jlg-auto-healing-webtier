<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fafafa"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold">Global360 Auto-Healing Web Tier — Azure</text>

  <rect x="40" y="70" width="140" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="110" y="105" text-anchor="middle" font-size="14">Internet</text>

  <rect x="240" y="70" width="160" height="60" rx="8" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="320" y="95" text-anchor="middle" font-size="13">Public IP</text>
  <text x="320" y="115" text-anchor="middle" font-size="11">pip-global360-webtier</text>

  <rect x="460" y="70" width="180" height="60" rx="8" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="550" y="95" text-anchor="middle" font-size="13">Standard LB</text>
  <text x="550" y="115" text-anchor="middle" font-size="11">HTTP probe :80</text>

  <rect x="120" y="200" width="680" height="260" rx="10" fill="#f1f8e9" stroke="#558b2f" stroke-dasharray="6,4"/>
  <text x="140" y="225" font-size="14" font-weight="bold">rg-global360-webtier / vnet-global360-webtier</text>

  <rect x="160" y="250" width="260" height="170" rx="8" fill="#e8eaf6" stroke="#3949ab"/>
  <text x="290" y="280" text-anchor="middle" font-size="14" font-weight="bold">VMSS (2 instances)</text>
  <text x="290" y="305" text-anchor="middle" font-size="11">vmss-global360-webtier</text>
  <text x="290" y="325" text-anchor="middle" font-size="11">Zones 1 &amp; 2</text>

  <rect x="190" y="345" width="90" height="55" rx="6" fill="#fff" stroke="#666"/>
  <text x="235" y="370" text-anchor="middle" font-size="10">VM 1</text>
  <text x="235" y="385" text-anchor="middle" font-size="10">Docker</text>

  <rect x="300" y="345" width="90" height="55" rx="6" fill="#fff" stroke="#666"/>
  <text x="345" y="370" text-anchor="middle" font-size="10">VM 2</text>
  <text x="345" y="385" text-anchor="middle" font-size="10">Docker</text>

  <rect x="500" y="280" width="240" height="100" rx="8" fill="#fce4ec" stroke="#c2185b"/>
  <text x="620" y="320" text-anchor="middle" font-size="13">GHCR</text>
  <text x="620" y="345" text-anchor="middle" font-size="10">ghcr.io/.../global360-webtier</text>
  <text x="620" y="365" text-anchor="middle" font-size="10">cloud-init docker pull</text>

  <line x1="180" y1="100" x2="240" y2="100" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="460" y2="100" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="550" y1="130" x2="550" y2="180" stroke="#333"/>
  <line x1="550" y1="180" x2="290" y2="240" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="420" y1="370" x2="500" y2="330" stroke="#c2185b" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <text x="460" y="490" text-anchor="middle" font-size="12" fill="#555">Terraform provisions all resources · VMSS replaces failed instances automatically</text>
